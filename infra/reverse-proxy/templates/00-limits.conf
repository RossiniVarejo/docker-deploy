# Shared rate-limit zones — loaded once for the whole proxy.
limit_req_zone $binary_remote_addr zone=login_strict:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_normal:10m  rate=60r/m;

# Minimal healthcheck endpoint for the proxy itself.
server {
    listen 80 default_server;
    server_name _;
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
