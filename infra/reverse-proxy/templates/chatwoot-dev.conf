# Chatwoot — HTTP-only (pre-certificate / ACME challenge phase).
server {
    listen 80;
    listen [::]:80;
    server_name CHATWOOT_DOMAIN;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location = /ping {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "pong\n";
    }

    location / {
        proxy_pass http://chatwoot-rails:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout    86400;
        proxy_connect_timeout    10s;
    }

    client_max_body_size 50M;
    access_log /var/log/nginx/chatwoot_access.log;
    error_log  /var/log/nginx/chatwoot_error.log warn;
}
