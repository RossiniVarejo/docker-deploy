---
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    restart: ${RESTART:-unless-stopped}
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD in infra/shared/.env}
      N8N_HOST: ${N8N_DOMAIN:?set N8N_DOMAIN in infra/shared/.env}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_DOMAIN:?set N8N_DOMAIN in infra/shared/.env}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in infra/shared/.env}
      N8N_PROXY_HOPS: 1
      GENERIC_TIMEZONE: ${TZ:-America/Sao_Paulo}
      TZ: ${TZ:-America/Sao_Paulo}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${N8N_DATA_PATH:-/srv/docker-data/n8n/data}:/home/node/.n8n
      - ${N8N_FILES_PATH:-/srv/docker-data/n8n/files}:/files
    networks:
      - rossini-shared

  n8n-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - n8n
    ports:
      - ${N8N_HTTP_PORT:-8081}:80
      - ${N8N_HTTPS_PORT:-8444}:443
    volumes:
      - ${N8N_NGINX_CONF_PATH:-./nginx/n8n.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${N8N_CERTS_PATH:-./certs}:/etc/nginx/certs:ro
      - n8n-certbot-webroot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rossini-shared

  n8n-certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - n8n-certbot-webroot:/var/www/certbot
      - n8n-letsencrypt:/etc/letsencrypt
      - ${N8N_CERTS_PATH:-./certs}:/etc/nginx/certs
    networks:
      - rossini-shared

networks:
  rossini-shared:
    name: ${SHARED_NETWORK_NAME:-rossini-shared}
    external: true

volumes:
  n8n-certbot-webroot:
  n8n-letsencrypt:
