---
# n8n app stack — no nginx/certbot here.
# TLS termination and routing are handled by infra/reverse-proxy.
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    restart: ${RESTART:-unless-stopped}
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD in infra/shared/.env}
      N8N_HOST: ${N8N_DOMAIN:?set N8N_DOMAIN in infra/shared/.env}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_DOMAIN:?set N8N_DOMAIN in infra/shared/.env}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in infra/shared/.env}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?set N8N_BASIC_AUTH_USER in infra/shared/.env}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?set N8N_BASIC_AUTH_PASSWORD in infra/shared/.env}
      N8N_PROXY_HOPS: 1
      GENERIC_TIMEZONE: ${TZ:-America/Sao_Paulo}
      TZ: ${TZ:-America/Sao_Paulo}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${N8N_DATA_PATH:-/srv/docker-data/n8n/data}:/home/node/.n8n
      - ${N8N_FILES_PATH:-/srv/docker-data/n8n/files}:/files
    networks:
      - rossini-shared

networks:
  rossini-shared:
    name: ${SHARED_NETWORK_NAME:-rossini-shared}
    external: true
