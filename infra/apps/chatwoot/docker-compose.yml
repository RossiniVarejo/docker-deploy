---
# Chatwoot aligned to Rossini shared-structure.
# - Joined to rossini-shared network; proxied through infra/reverse-proxy.
# - Shared Postgres cluster supplies the database (no bundled postgres).
# - Redis must be provided externally; set REDIS_URL in infra/apps/chatwoot/.env.
# - Storage is mounted as a named volume.
services:
  base: &base
    image: chatwoot/chatwoot:latest
    env_file: .env
    restart: ${RESTART:-unless-stopped}
    volumes:
      - chatwoot-storage:/app/storage
    networks:
      - rossini-shared
      - rossini-data

  chatwoot-rails:
    <<: *base
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  chatwoot-sidekiq:
    <<: *base
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

volumes:
  chatwoot-storage:

networks:
  rossini-shared:
    name: ${SHARED_NETWORK_NAME:-rossini-shared}
    external: true
  rossini-data:
    name: ${DATA_NETWORK_NAME:-rossini-data}
    external: true
