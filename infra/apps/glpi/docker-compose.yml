---
services:
  glpi-db:
    image: mysql:${GLPI_MYSQL_VERSION:-8.4}
    restart: ${RESTART:-unless-stopped}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in infra/shared/.env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-glpi}
      MYSQL_USER: ${MYSQL_USER:-glpi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in infra/shared/.env}
      TZ: ${GLPI_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ${GLPI_MYSQL_DATA_PATH:-/srv/docker-data/glpi/mysql}:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/glpi.cnf:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - rossini-shared

  glpi:
    image: glpi/glpi:${GLPI_VERSION:-11.0.6}
    restart: ${RESTART:-unless-stopped}
    environment:
      GLPI_INSTALL_MODE: docker
      TZ: ${GLPI_TIMEZONE:-America/Sao_Paulo}
    depends_on:
      glpi-db:
        condition: service_healthy
    volumes:
      - ${GLPI_FILES_PATH:-/srv/docker-data/glpi/files}:/var/www/glpi/files
      - ${GLPI_PLUGINS_PATH:-/srv/docker-data/glpi/plugins}:/var/www/glpi/plugins
      - ${GLPI_MARKETPLACE_PATH:-/srv/docker-data/glpi/marketplace}:/var/www/glpi/marketplace
      - ${GLPI_CONFIG_PATH:-/srv/docker-data/glpi/config}:/var/www/glpi/config
      - ./php/glpi.ini:/usr/local/etc/php/conf.d/99-glpi.ini:ro
    networks:
      - rossini-shared

  glpi-cron:
    image: glpi/glpi:${GLPI_VERSION:-11.0.6}
    restart: ${RESTART:-unless-stopped}
    environment:
      TZ: ${GLPI_TIMEZONE:-America/Sao_Paulo}
    command: >
      sh -c "while true; do php /var/www/glpi/front/cron.php --force >>
      /var/log/glpi-cron.log 2>&1; sleep ${GLPI_CRON_INTERVAL_SECONDS:-60};
      done"
    depends_on:
      glpi:
        condition: service_started
    user: "33:33"
    volumes:
      - ${GLPI_FILES_PATH:-/srv/docker-data/glpi/files}:/var/www/glpi/files
      - ${GLPI_PLUGINS_PATH:-/srv/docker-data/glpi/plugins}:/var/www/glpi/plugins
      - ${GLPI_CONFIG_PATH:-/srv/docker-data/glpi/config}:/var/www/glpi/config
      - ./php/glpi.ini:/usr/local/etc/php/conf.d/99-glpi.ini:ro
    networks:
      - rossini-shared

  glpi-nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - glpi
    ports:
      - ${GLPI_HTTP_PORT:-8080}:80
      - ${GLPI_HTTPS_PORT:-8443}:443
    volumes:
      - ${GLPI_NGINX_CONF_PATH:-./nginx/glpi.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${GLPI_CERTS_PATH:-./certs}:/etc/nginx/certs:ro
      - ${GLPI_FILES_PATH:-/srv/docker-data/glpi/files}:/var/www/glpi/files:ro
      - glpi-certbot-webroot:/var/www/certbot:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rossini-shared

  glpi-certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - glpi-certbot-webroot:/var/www/certbot
      - glpi-letsencrypt:/etc/letsencrypt
      - ${GLPI_CERTS_PATH:-./certs}:/etc/nginx/certs
    networks:
      - rossini-shared

networks:
  rossini-shared:
    name: ${SHARED_NETWORK_NAME:-rossini-shared}
    external: true

volumes:
  glpi-certbot-webroot:
  glpi-letsencrypt:
